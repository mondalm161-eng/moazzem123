<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #main-content, #settings-section, .form-section { display: none; }
        .active-tab { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
        .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="login-section" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900"><span class="text-blue-600">ADMIN</span> LOGIN</h2>
                <p class="text-gray-500 mt-2">Access your professional workspace</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userId" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="User ID">
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Password">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-lg transition">LOG IN</button>
                <p id="error-msg" class="text-red-500 text-sm text-center hidden">Invalid ID or Password</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="container mx-auto px-4 py-10">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left">
            <div>
                <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">
                    <span class="text-blue-600">ADMIN</span> TOOLS
                </h1>
                <div class="w-20 h-1 bg-blue-600 mt-2 rounded-full mx-auto md:mx-0"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSettings()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg transition text-sm font-bold">
                    <i class="fas fa-cog mr-2"></i>SETTINGS
                </button>
                <button onclick="handleLogout()" class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-lg transition text-sm font-bold">
                    <i class="fas fa-sign-out-alt mr-2"></i>LOGOUT
                </button>
            </div>
        </header>

        <section id="settings-section" class="mb-10 bg-white p-6 rounded-2xl border border-blue-100 shadow-sm animate-fade-in">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Change Admin Password</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="password" id="newPass" class="px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="New Password">
                <input type="password" id="confirmPass" class="px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Confirm Password">
                <button onclick="updatePassword()" class="bg-green-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-700 transition">Update Password</button>
            </div>
            <p id="setting-msg" class="mt-2 text-sm font-medium"></p>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <button onclick="showForm('registry')" id="tab-registry" class="flex items-center justify-center p-4 bg-white border border-gray-200 rounded-xl hover:border-blue-500 transition-all font-bold">
                <i class="fas fa-id-card mr-3 text-blue-600"></i> REGISTRY
            </button>
            <button onclick="showForm('record')" id="tab-record" class="flex items-center justify-center p-4 bg-white border border-gray-200 rounded-xl hover:border-blue-500 transition-all font-bold">
                <i class="fas fa-clipboard-list mr-3 text-green-600"></i> RECORD
            </button>
            <button onclick="showForm('due')" id="tab-due" class="flex items-center justify-center p-4 bg-white border border-gray-200 rounded-xl hover:border-blue-500 transition-all font-bold">
                <i class="fas fa-hand-holding-usd mr-3 text-red-600"></i> DUE ENTRY
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <section class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div id="form-header" class="bg-blue-600 px-6 py-4 transition-all duration-300">
                        <h2 id="header-text" class="text-white font-semibold text-lg flex items-center">
                            <i class="fas fa-edit mr-3"></i> DATA ENTRY
                        </h2>
                    </div>
                    
                    <div class="p-8">
                        <div id="form-registry" class="form-section">
                            <form onsubmit="submitData(event, 'https://script.google.com/macros/s/AKfycbxIGiMY8T0TTljJQedKp4vTylAahmnZCh_53XjCbu239w26l6zF5OsDVY5NW2AfsU1Ucw/exec')">
                                <div class="grid grid-cols-1 gap-4">
                                    <input type="text" name="name" placeholder="Name" required class="p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                                    <input type="tel" name="mobile" placeholder="Mobile" required class="p-3 border rounded-lg">
                                    <input type="email" name="email" placeholder="Email" required class="p-3 border rounded-lg">
                                    <textarea name="address" placeholder="Address" required class="p-3 border rounded-lg h-24"></textarea>
                                </div>
                                <button type="submit" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">SUBMIT TO REGISTRY</button>
                            </form>
                        </div>

                        <div id="form-record" class="form-section">
                            <form onsubmit="submitData(event, 'https://script.google.com/macros/s/AKfycbyvVRbI8yyGfdMx_6JetVtuexgstCICRrmrlIsm1mOtdkVwBBNdJzOX6rWRnGtbs5Z6Cw/exec')">
                                <div class="grid grid-cols-1 gap-4">
                                    <input type="text" name="name" placeholder="Name" required class="p-3 border rounded-lg outline-none focus:ring-2 focus:ring-green-500">
                                    <input type="tel" name="mobile" placeholder="Mobile" required class="p-3 border rounded-lg">
                                    <input type="email" name="email" placeholder="Email" required class="p-3 border rounded-lg">
                                    <textarea name="address" placeholder="Address" required class="p-3 border rounded-lg h-24"></textarea>
                                </div>
                                <button type="submit" class="mt-6 w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">SUBMIT TO RECORD</button>
                            </form>
                        </div>

                        <div id="form-due" class="form-section">
                            <form onsubmit="submitData(event, 'https://script.google.com/macros/s/AKfycbx64Hzmc51TGfFaNch4vr0dexywMBBZGvtovZy_YP9gHDxEc9UJX2hUuVG9GdwigT3KBQ/exec')">
                                <div class="grid grid-cols-1 gap-4">
                                    <input type="text" name="name" placeholder="Customer Name" required class="p-3 border rounded-lg outline-none focus:ring-2 focus:ring-red-500">
                                    <input type="tel" name="mobile" placeholder="Mobile" required class="p-3 border rounded-lg">
                                    <input type="number" name="due" placeholder="DUE AMOUNT" required class="p-3 border rounded-lg">
                                    <textarea name="address" placeholder="Address" required class="p-3 border rounded-lg h-24"></textarea>
                                </div>
                                <button type="submit" class="mt-6 w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">SUBMIT DUE ENTRY</button>
                            </form>
                        </div>

                        <div id="status-box" class="mt-6 p-4 rounded-lg text-center hidden font-bold"></div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-1">
                <section class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden h-full">
                    <div class="bg-gray-800 px-6 py-4">
                        <h2 class="text-white font-semibold text-lg flex items-center">
                            <i class="fas fa-tasks mr-3"></i> QUICK LINKS
                        </h2>
                    </div>
                    <div class="p-6 space-y-6">
                        <a href="https://docs.google.com/spreadsheets" target="_blank" class="flex items-center p-5 bg-green-50 border border-green-100 rounded-2xl hover:bg-green-100 transition group">
                            <i class="fas fa-file-excel text-green-600 text-3xl mr-5"></i>
                            <div><h3 class="font-bold text-green-900 text-lg">Sheets</h3></div>
                        </a>
                        <a href="https://drive.google.com" target="_blank" class="flex items-center p-5 bg-yellow-50 border border-yellow-100 rounded-2xl hover:bg-yellow-100 transition group">
                            <i class="fab fa-google-drive text-yellow-600 text-3xl mr-5"></i>
                            <div><h3 class="font-bold text-yellow-900 text-lg">Drive</h3></div>
                        </a>
                    </div>
                </section>
            </div>
        </div>

        <footer class="mt-16 text-center text-gray-400">
            <p class="text-sm uppercase tracking-widest">&copy; 2026 Admin Panel Design</p>
        </footer>
    </div>

    <script>
        // --- ⚙️ LOGIN & PASSWORD LOGIC ---
        if (!localStorage.getItem("admin_id")) {
            localStorage.setItem("admin_id", "admin");
            localStorage.setItem("admin_pass", "123456"); // Default Password
        }

        function handleLogin() {
            const u = document.getElementById('userId').value;
            const p = document.getElementById('password').value;
            if (u === localStorage.getItem("admin_id") && p === localStorage.getItem("admin_pass")) {
                sessionStorage.setItem("logged_in", "true");
                showDashboard();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            showForm('registry');
        }

        function handleLogout() {
            sessionStorage.removeItem("logged_in");
            location.reload();
        }

        function toggleSettings() {
            const s = document.getElementById('settings-section');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        }

        function updatePassword() {
            const newP = document.getElementById('newPass').value;
            const confP = document.getElementById('confirmPass').value;
            const msg = document.getElementById('setting-msg');

            if (newP && newP === confP) {
                localStorage.setItem("admin_pass", newP);
                msg.innerText = "✅ Password updated successfully!";
                msg.className = "mt-2 text-sm font-medium text-green-600";
                document.getElementById('newPass').value = "";
                document.getElementById('confirmPass').value = "";
            } else {
                msg.innerText = "❌ Passwords do not match!";
                msg.className = "mt-2 text-sm font-medium text-red-600";
            }
        }

        // --- 📊 TAB & SUBMISSION LOGIC ---
        function showForm(formId) {
            document.querySelectorAll('.form-section').forEach(f => f.style.display = 'none');
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('active-tab'));
            
            const form = document.getElementById('form-' + formId);
            const tab = document.getElementById('tab-' + formId);
            const header = document.getElementById('form-header');
            const headerText = document.getElementById('header-text');

            form.style.display = 'block';
            tab.classList.add('active-tab');
            document.getElementById('status-box').classList.add('hidden');

            const configs = {
                'registry': { color: 'bg-blue-600', text: 'REGISTRY ENTRY' },
                'record': { color: 'bg-green-600', text: 'RECORD ENTRY' },
                'due': { color: 'bg-red-600', text: 'DUE AMOUNT ENTRY' }
            };

            header.className = configs[formId].color + ' px-6 py-4 transition-all duration-300';
            headerText.innerHTML = `<i class="fas fa-edit mr-3"></i> ${configs[formId].text}`;
        }

        function submitData(event, url) {
            event.preventDefault();
            const statusBox = document.getElementById('status-box');
            const form = event.target;
            const formData = new FormData(form);

            statusBox.classList.remove('hidden');
            statusBox.className = "mt-6 p-4 rounded-lg text-center font-bold bg-gray-100 text-gray-700";
            statusBox.innerHTML = '<span class="loader-spin mr-2"></span> Submitting...';

            fetch(url, { method: "POST", body: formData })
            .then(() => {
                statusBox.innerHTML = "✅ Data Submitted Successfully";
                statusBox.className = "mt-6 p-4 rounded-lg text-center font-bold bg-green-100 text-green-700";
                form.reset();
            })
            .catch(() => {
                statusBox.innerHTML = "❌ Error Submitting Data";
                statusBox.className = "mt-6 p-4 rounded-lg text-center font-bold bg-red-100 text-red-700";
            });
        }

        window.onload = () => { 
            if(sessionStorage.getItem("logged_in") === "true") showDashboard(); 
        };
    </script>

</body>
</html>
